safety_supervisor:
  ros__parameters:
    lidar_topic: /jt128/front/points
    robot_state_topic: /robot_state
    map_topic: /map
    map_representation: occupancy_grid_2d
    require_map: true
    require_localization: true
    localization_status_topic: /a2/localization_ok
    allow_motion_topic: /a2/allow_motion
    map_ready_topic: /a2/map_ready
    estop_topic: /a2/estop
    lidar_timeout_sec: 0.5
    state_timeout_sec: 0.5
    map_timeout_sec: 5.0
