localization_gate:
  ros__parameters:
    input_pose_topic: /odom
    input_pose_msg_type: nav_msgs/msg/Odometry
    status_topic: /a2/localization_ok
    status_report_topic: /a2/localization/status
    max_pose_age_sec: 2.0
    latch_valid_pose: false
    latched_pose_timeout_sec: 5.0
    pose_transient_local: false
    allow_zero_stamp_as_now: true
    max_xy_variance: 0.30
    max_yaw_variance: 0.20
